version: 2
updates:
    - package-ecosystem: github-actions
      directory: '/'
      schedule:
          interval: weekly
      open-pull-requests-limit: 10
      cooldown:
          default-days: 7

    - package-ecosystem: npm
      directory: '/'
      schedule:
          interval: weekly
      open-pull-requests-limit: 10
      cooldown:
          default-days: 7
      groups:
          wordpress-packages:
              patterns:
                  - '@wordpress/*'
      ignore:
          # WordPress packages peer-depend on @types/react ^18; React 19 types conflict.
          - dependency-name: '@types/react'
            update-types:
                - version-update:semver-major

    - package-ecosystem: composer
      directory: '/'
      schedule:
          interval: weekly
      open-pull-requests-limit: 10
      cooldown:
          default-days: 7
      groups:
          phpstan-packages:
              patterns:
                  - 'phpstan/*'
          wp-cli-packages:
              patterns:
                  - 'wp-cli/*'
